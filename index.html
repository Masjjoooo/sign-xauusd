<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>XAUUSD SIGNAL PRO</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chart{
height:450px;
margin:20px;
}

.box{
background:#1e293b;
padding:20px;
border-radius:10px;
width:300px;
margin:auto;
}

.signal{
font-size:32px;
font-weight:bold;
}

.buy{color:#00ff9d;}
.sell{color:#ff4d4d;}

</style>
</head>

<body>

<h2>XAUUSD SIGNAL PRO</h2>

<div id="chart"></div>

<div class="box">

<div id="signal" class="signal">WAITING DATA</div>

Entry : <span id="entry">-</span><br>
TP : <span id="tp">-</span><br>
SL : <span id="sl">-</span><br>
Confidence : <span id="conf">0%</span>

</div>

<script>

const chart = LightweightCharts.createChart(document.getElementById('chart'),{

width:window.innerWidth-20,
height:450,

layout:{
background:{color:"#0f172a"},
textColor:"#DDD"
},

grid:{
vertLines:{color:"#1f2937"},
horzLines:{color:"#1f2937"}
}

})

const candleSeries = chart.addCandlestickSeries()

let candles=[]

async function getPrice(){

const res = await fetch("https://api.gold-api.com/price/XAUUSD")
const data = await res.json()

return data.price

}

function EMA(period,data){

let k=2/(period+1)
let ema=data[0]

for(let i=1;i<data.length;i++){

ema=data[i]*k+ema*(1-k)

}

return ema

}

function RSI(data,period=14){

let gains=0
let losses=0

for(let i=data.length-period;i<data.length;i++){

let diff=data[i]-data[i-1]

if(diff>0) gains+=diff
else losses+=Math.abs(diff)

}

let rs=gains/losses

return 100-(100/(1+rs))

}

function MACD(data){

let ema12=EMA(12,data)
let ema26=EMA(26,data)

return ema12-ema26

}

function support(data){

return Math.min(...data.slice(-20))

}

function resistance(data){

return Math.max(...data.slice(-20))

}

function analyze(){

if(candles.length<50) return

let closes=candles.map(c=>c.close)

let ema20=EMA(20,closes)
let ema50=EMA(50,closes)

let rsi=RSI(closes)

let macd=MACD(closes)

let sup=support(closes)
let res=resistance(closes)

let price=closes[closes.length-1]

let signal="WAIT"
let conf=0

if(

ema20>ema50 &&
rsi<60 &&
macd>0 &&
price>sup

){

signal="BUY"
conf=75

}

if(

ema20<ema50 &&
rsi>40 &&
macd<0 &&
price<res

){

signal="SELL"
conf=75

}

display(signal,price,conf)

}

function display(type,price,conf){

let signal=document.getElementById("signal")
let entry=document.getElementById("entry")
let tp=document.getElementById("tp")
let sl=document.getElementById("sl")
let cf=document.getElementById("conf")

entry.innerHTML=price.toFixed(2)

if(type=="BUY"){

signal.innerHTML="BUY"
signal.className="signal buy"

tp.innerHTML=(price+4).toFixed(2)
sl.innerHTML=(price-2).toFixed(2)

}

else if(type=="SELL"){

signal.innerHTML="SELL"
signal.className="signal sell"

tp.innerHTML=(price-4).toFixed(2)
sl.innerHTML=(price+2).toFixed(2)

}

cf.innerHTML=conf+"%"

}

async function update(){

let price=await getPrice()

let time=Math.floor(Date.now()/1000)

let candle={
time:time,
open:price,
high:price,
low:price,
close:price
}

candles.push(candle)

if(candles.length>300) candles.shift()

candleSeries.setData(candles)

analyze()

}

setInterval(update,5000)

</script>

</body>
</html>
