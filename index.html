<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>XAUUSD AI SIGNAL</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chart{
height:500px;
margin:20px;
}

.panel{
background:#1e293b;
padding:20px;
width:320px;
margin:auto;
border-radius:10px;
}

#signal{
font-size:32px;
font-weight:bold;
margin-bottom:10px;
}

.buy{color:#00ff9d;}
.sell{color:#ff4d4d;}

</style>

</head>

<body>

<h2>XAUUSD AI SIGNAL</h2>

<div id="chart"></div>

<div class="panel">

<div id="signal">LOADING MARKET...</div>

Entry : <span id="entry">-</span><br>
TP1 : <span id="tp1">-</span><br>
TP2 : <span id="tp2">-</span><br>
SL : <span id="sl">-</span><br>

Confidence : <span id="conf">0%</span>

</div>

<script>

const chart = LightweightCharts.createChart(document.getElementById('chart'),{
width:window.innerWidth-20,
height:500
})

const candleSeries = chart.addCandlestickSeries()

let candles=[]
let lastPrice=null

async function getPrice(){

try{

const res=await fetch("https://api.metals.live/v1/spot/gold")

const data=await res.json()

return data[0].price

}catch(e){

console.log("API ERROR",e)
return null

}

}

function EMA(period,data){

let k=2/(period+1)
let ema=data[0]

for(let i=1;i<data.length;i++){

ema=data[i]*k + ema*(1-k)

}

return ema

}

function analyze(){

if(candles.length<30) return

let closes=candles.map(c=>c.close)

let ema9=EMA(9,closes)
let ema21=EMA(21,closes)

let price=closes[closes.length-1]

let signal="WAIT"
let conf=0

if(ema9>ema21){

signal="BUY"
conf=72

}

if(ema9<ema21){

signal="SELL"
conf=72

}

displaySignal(signal,price,conf)

}

function displaySignal(type,price,conf){

let s=document.getElementById("signal")

let entry=document.getElementById("entry")
let tp1=document.getElementById("tp1")
let tp2=document.getElementById("tp2")
let sl=document.getElementById("sl")
let cf=document.getElementById("conf")

entry.innerHTML=price.toFixed(2)

if(type=="BUY"){

s.innerHTML="BUY"
s.className="buy"

tp1.innerHTML=(price+2).toFixed(2)
tp2.innerHTML=(price+4).toFixed(2)
sl.innerHTML=(price-2).toFixed(2)

}

if(type=="SELL"){

s.innerHTML="SELL"
s.className="sell"

tp1.innerHTML=(price-2).toFixed(2)
tp2.innerHTML=(price-4).toFixed(2)
sl.innerHTML=(price+2).toFixed(2)

}

cf.innerHTML=conf+"%"

}

async function update(){

let price=await getPrice()

if(!price) return

let time=Math.floor(Date.now()/1000)

let candle={
time:time,
open:lastPrice || price,
high:Math.max(price,lastPrice||price),
low:Math.min(price,lastPrice||price),
close:price
}

lastPrice=price

candles.push(candle)

if(candles.length>200) candles.shift()

candleSeries.setData(candles)

analyze()

}

setInterval(update,3000)

</script>

</body>
</html>
